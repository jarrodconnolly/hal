[project]
name = "hal"
version = "0.1.0"
description = "Highly Adaptable Learning AI for text processing and RAG"
authors = [{name = "Jarrod Connolly"}]
dependencies = [
    "PyPDF2>=3.0.1",
    "sentence-transformers>=2.2.2",
    "faiss-gpu>=1.7.2",
    "numpy>=1.26.4,<2.0", # Avoid NumPy 2.x issues
    "torch>=2.0.1",
    "vllm>=0.3.1", # For LLM speed
    "langchain>=0.1.0", # For RAG
    "python-dotenv>=1.0.1",
    "langchain-community>=0.3.18",
    "langchain-huggingface>=0.1.2",
    "setuptools>=61.0",
    "bitsandbytes>=0.45.3",
    "python-docx>=1.1.2",
    "pypdfium2>=4.30.1",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
